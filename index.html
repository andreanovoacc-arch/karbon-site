<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KARBÓN — Carnicería Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b0a09;
        --bg2: #12100e;
        --panel: #171412;
        --panel2: #1e1a16;
        --stone: #151311;
        --line: #2a2521;
        --line2: #3a332c;
        --wood: #3b2a1d;
        --wood2: #4a3423;
        --wood3: #2b1f15;
        --text: #eee9e1;
        --muted: #a1968a;
        --dim: #6e655a;
        --steel1: #f2f2f0;
        --steel2: #c8c7c4;
        --steel3: #8e8c88;
        --steel4: #5f5d5a;
        --amber: #c98a3d;
        --amber2: #a86f2c;
        --red: #a03530;
        --red2: #7f2723;
        --green: #5fb878;
        --gold: #d2a75c;
        --sans: "Inter", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --disp: "Archivo", "Arial Narrow", Impact, Helvetica, Arial, sans-serif;
        --r: 12px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      html,
      body {
        overflow-x: clip;
      }
      :focus-visible {
        outline: 2px solid var(--amber);
        outline-offset: 2px;
      }
      body {
        background: radial-gradient(1200px 500px at 70% -200px, rgba(201, 138, 61, 0.06), transparent 60%), var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
      }
      ::selection {
        background: var(--red);
        color: #fff;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      input,
      select {
        font-family: inherit;
      }
      .steel {
        background: linear-gradient(178deg, var(--steel1) 8%, var(--steel2) 38%, var(--steel3) 62%, var(--steel4) 88%, #bdbcb9 99%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .disp {
        font-family: var(--disp);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 800;
      } /* ============ TOP UTILITY BAR ============ */
      .topbar {
        background: #080706;
        border-bottom: 1px solid var(--line);
        font-size: 12.5px;
      }
      .topbar .in {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 22px;
        height: 38px;
        display: flex;
        align-items: center;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .topbar .in::-webkit-scrollbar {
        display: none;
      }
      .topbar button {
        white-space: nowrap;
        flex-shrink: 0;
        background: none;
        border: none;
        color: var(--muted);
        padding: 4px 11px;
        font-size: 12.5px;
        font-weight: 600;
        border-radius: 6px;
      }
      .topbar button:hover {
        color: var(--text);
      }
      .topbar .sp {
        flex: 1;
      }
      .lang {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }
      .lang button {
        padding: 3px 9px;
        font-size: 11.5px;
        border-radius: 0;
      }
      .lang button.on {
        background: var(--panel2);
        color: var(--gold);
      } /* ============ MAIN HEADER ============ */
      .mainhead {
        background: linear-gradient(180deg, #100e0c, #0b0a09);
        border-bottom: 1px solid var(--line);
      }
      .mainhead .in {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 22px;
        height: 88px;
        display: flex;
        align-items: center;
        gap: 26px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }
      .bull {
        width: 46px;
        height: 46px;
        flex-shrink: 0;
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
      }
      .wordmark {
        line-height: 1;
      }
      .wordmark .km {
        font-family: var(--disp);
        font-size: 31px;
        font-weight: 900;
        letter-spacing: 0.1em;
        background: linear-gradient(178deg, #f4f4f2 5%, #cfcecb 35%, #8f8d89 62%, #5f5d5a 86%, #c4c3c0 99%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .wordmark .tg {
        display: block;
        font-size: 9px;
        letter-spacing: 0.42em;
        color: var(--dim);
        text-transform: uppercase;
        font-weight: 700;
        margin-top: 3px;
      }
      .search {
        flex: 1;
        max-width: 560px;
        position: relative;
      }
      .search input {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--line2);
        border-radius: 999px;
        color: var(--text);
        padding: 12px 48px 12px 20px;
        font-size: 14px;
        outline: none;
        transition: 0.15s;
      }
      .search input:focus {
        border-color: var(--amber);
        box-shadow: 0 0 0 3px rgba(201, 138, 61, 0.12);
      }
      .search input::placeholder {
        color: var(--dim);
      }
      .search .go {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(180deg, var(--amber), var(--amber2));
        color: #161310;
        font-size: 15px;
        font-weight: 800;
      }
      .hacts {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .hbtn {
        background: none;
        border: none;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 6px 11px;
        border-radius: 9px;
        font-size: 11px;
        font-weight: 600;
      }
      .hbtn:hover {
        color: var(--text);
        background: var(--panel);
      }
      .hbtn .i {
        font-size: 19px;
        line-height: 1;
      }
      .cartbtn {
        position: relative;
        background: linear-gradient(180deg, #2a2520, #1c1815);
        border: 1px solid var(--line2);
        color: var(--text);
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .cartbtn:hover {
        border-color: var(--amber);
      }
      .cartbtn .tot {
        color: var(--gold);
      }
      .badge {
        position: absolute;
        top: -8px;
        right: -8px;
        background: var(--red);
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        min-width: 20px;
        height: 20px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
        border: 2px solid var(--bg);
      } /* ============ CATEGORY NAV (wood bar) ============ */
      .catnav {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(0, 0, 0, 0.25)),
          repeating-linear-gradient(90deg, var(--wood3) 0px, var(--wood) 3px, var(--wood3) 7px, var(--wood2) 11px, var(--wood3) 16px);
        border-bottom: 1px solid #000;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 6px 18px rgba(0, 0, 0, 0.45);
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .catnav .in {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 12px;
        display: flex;
        align-items: center;
        overflow-x: auto;
      }
      .catnav button {
        background: none;
        border: none;
        color: #d9cdbd;
        padding: 15px 17px;
        font-family: var(--disp);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        white-space: nowrap;
        border-bottom: 3px solid transparent;
        transition: 0.15s;
      }
      .catnav button:hover {
        color: #fff;
        background: rgba(0, 0, 0, 0.18);
      }
      .catnav button.on {
        color: var(--gold);
        border-bottom-color: var(--gold);
        background: rgba(0, 0, 0, 0.22);
      }
      .catnav button.hot {
        color: #ffb08a;
      }
      .catnav .sp {
        flex: 1;
      }
      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 30px 22px 70px;
      } /* ============ SHARED ============ */
      .eyebrow {
        color: var(--amber);
        font-family: var(--disp);
        font-size: 11.5px;
        font-weight: 800;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      h1 {
        font-family: var(--disp);
        text-transform: uppercase;
        font-weight: 900;
        font-size: 52px;
        line-height: 1.02;
        letter-spacing: 0.02em;
      }
      h2 {
        font-family: var(--disp);
        text-transform: uppercase;
        font-weight: 800;
        font-size: 26px;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }
      .sub {
        color: var(--muted);
        max-width: 660px;
        margin-top: 10px;
        font-size: 14.5px;
      }
      .btn {
        border: none;
        border-radius: 10px;
        padding: 13px 24px;
        font-weight: 700;
        font-size: 13.5px;
        font-family: var(--disp);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: 0.15s;
      }
      .btn-p {
        background: linear-gradient(180deg, #d99a4b, #b3762e);
        color: #171310;
        box-shadow:
          0 3px 14px rgba(201, 138, 61, 0.3),
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
      }
      .btn-p:hover {
        filter: brightness(1.07);
      }
      .btn-r {
        background: linear-gradient(180deg, #b13e37, #8a2c27);
        color: #fff;
        box-shadow: 0 3px 14px rgba(160, 53, 48, 0.35);
      }
      .btn-r:hover {
        filter: brightness(1.08);
      }
      .btn-g {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line2);
      }
      .btn-g:hover {
        border-color: var(--dim);
      }
      .btn-s {
        background: none;
        border: 1px solid var(--line2);
        color: var(--muted);
        padding: 9px 15px;
        font-size: 12px;
      }
      .btn-s:hover {
        color: var(--text);
        border-color: var(--dim);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .card {
        background: linear-gradient(180deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 20px;
      }
      .empty {
        border: 1px dashed var(--line2);
        border-radius: var(--r);
        padding: 48px 20px;
        text-align: center;
        color: var(--dim);
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="date"],
      select {
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--line2);
        border-radius: 9px;
        color: var(--text);
        padding: 11px 13px;
        font-size: 14px;
        outline: none;
        transition: 0.15s;
      }
      input:focus,
      select:focus {
        border-color: var(--amber);
      }
      label.f {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        margin: 0 0 6px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-family: var(--disp);
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--panel2);
        border: 1px solid var(--line2);
        color: var(--muted);
        border-radius: 20px;
        padding: 3px 11px;
        font-size: 11.5px;
        font-weight: 700;
      } /* ============ HERO ============ */
      .herowrap {
        display: grid;
        grid-template-columns: 1.7fr 1fr;
        gap: 16px;
        margin-bottom: 14px;
      }
      .hero {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--line2);
        min-height: 430px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 54px;
        background:
          radial-gradient(700px 300px at 50% -80px, rgba(210, 167, 92, 0.2), transparent 65%), radial-gradient(500px 400px at 108% 118%, rgba(160, 53, 48, 0.2), transparent 60%),
          linear-gradient(200deg, #1a1613 0%, #0d0b09 55%, #0a0908 100%);
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.5;
        pointer-events: none;
        background: repeating-linear-gradient(115deg, transparent 0 34px, rgba(255, 255, 255, 0.014) 34px 35px), repeating-linear-gradient(25deg, transparent 0 52px, rgba(0, 0, 0, 0.25) 52px 54px);
      }
      .hero::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 90px;
        pointer-events: none;
        background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.55)), repeating-linear-gradient(90deg, #241a10 0 5px, #1a1209 5px 10px, #20160d 10px 16px);
        opacity: 0.55;
        -webkit-mask-image: linear-gradient(180deg, transparent, black 70%);
        mask-image: linear-gradient(180deg, transparent, black 70%);
      }
      .hero > * {
        position: relative;
        z-index: 2;
      }
      .hero h1 .l2 {
        display: block;
      }
      .hero .cta {
        display: flex;
        gap: 12px;
        margin-top: 30px;
        flex-wrap: wrap;
      }
      .hero .glowline {
        width: 64px;
        height: 3px;
        background: linear-gradient(90deg, var(--gold), transparent);
        margin: 20px 0 0;
      }
      .promos {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
      }
      .promo {
        position: relative;
        border-radius: 16px;
        border: 1px solid var(--line2);
        overflow: hidden;
        padding: 26px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        cursor: pointer;
        min-height: 200px;
        transition: 0.2s;
      }
      .promo:hover {
        border-color: var(--amber);
        transform: translateY(-2px);
      }
      .promo h3 {
        font-family: var(--disp);
        text-transform: uppercase;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.04em;
        line-height: 1.15;
      }
      .promo p {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 4px;
      }
      .promo .arr {
        position: absolute;
        right: 20px;
        bottom: 20px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(180deg, #b13e37, #8a2c27);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 17px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
        transition: 0.2s;
      }
      .promo:hover .arr {
        transform: translateX(4px);
      }
      .promo .art {
        position: absolute;
        top: -12px;
        right: -14px;
        opacity: 0.9;
        pointer-events: none;
      }
      .p1 {
        background: radial-gradient(400px 200px at 90% 0%, rgba(210, 167, 92, 0.24), transparent 60%), linear-gradient(160deg, #221b13, #100d0a 75%);
      }
      .p2 {
        background: radial-gradient(400px 200px at 90% 0%, rgba(160, 53, 48, 0.28), transparent 60%), linear-gradient(160deg, #1f1210, #0f0b0a 75%);
      } /* ============ TRUST STRIP ============ */
      .trust {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent), var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 26px;
        margin: 16px 0 40px;
      }
      .trust .it {
        display: flex;
        align-items: center;
        gap: 11px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .trust .it b {
        color: var(--text);
      }
      .trust .stars {
        color: var(--gold);
        letter-spacing: 2px;
        font-size: 14px;
      } /* ============ SERVICES ============ */
      .services {
        grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
        margin-top: 20px;
      }
      .svc {
        cursor: pointer;
        transition: 0.18s;
        position: relative;
      }
      .svc:hover {
        transform: translateY(-3px);
        border-color: var(--amber);
      }
      .svc .ic {
        width: 46px;
        height: 46px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
        background: linear-gradient(180deg, #2b241d, #1b1713);
        border: 1px solid var(--line2);
        color: var(--gold);
        font-size: 20px;
      }
      .svc h3 {
        font-size: 14.5px;
        font-weight: 700;
        font-family: var(--disp);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .svc p {
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.55;
        margin-top: 5px;
      }
      .svc .go {
        position: absolute;
        top: 18px;
        right: 18px;
        color: var(--dim);
        transition: 0.18s;
      }
      .svc:hover .go {
        color: var(--gold);
        transform: translateX(3px);
      } /* ============ CATALOG ============ */
      .toolrow {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 20px 0 24px;
        align-items: center;
      }
      .toolrow button {
        background: var(--panel);
        border: 1px solid var(--line2);
        color: var(--muted);
        padding: 8px 17px;
        border-radius: 20px;
        font-size: 12.5px;
        font-weight: 700;
        transition: 0.15s;
      }
      .toolrow button.on {
        background: linear-gradient(180deg, #2c241b, #211a13);
        border-color: var(--amber);
        color: var(--gold);
      }
      .products {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
      .prod {
        background: linear-gradient(180deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: var(--r);
        overflow: hidden;
        transition: 0.18s;
        display: flex;
        flex-direction: column;
      }
      .prod:hover {
        transform: translateY(-3px);
        border-color: var(--line2);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
      }
      .prod .img {
        height: 160px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(230px 130px at 50% 30%, rgba(210, 167, 92, 0.14), transparent 70%), linear-gradient(180deg, #191512, #100e0c);
      }
      .prod .img svg {
        filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.55));
      }
      .prod .tag {
        position: absolute;
        top: 12px;
        left: 12px;
        font-family: var(--disp);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 4px;
      }
      .tag.premium {
        background: linear-gradient(180deg, #e9e9e7, #b9b8b5);
        color: #22201d;
      }
      .tag.popular {
        background: linear-gradient(180deg, #d99a4b, #b3762e);
        color: #1c1610;
      }
      .tag.sale {
        background: linear-gradient(180deg, #b13e37, #8a2c27);
        color: #fff;
      }
      .prod .bd {
        padding: 17px 18px 18px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .prod h3 {
        font-size: 15px;
        font-weight: 700;
      }
      .prod .desc {
        color: var(--muted);
        font-size: 12.5px;
        margin: 4px 0 14px;
        flex: 1;
      }
      .prod .prow {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px 10px;
      }
      .prod .prow .add {
        margin-left: auto;
      }
      .price {
        font-family: var(--disp);
        font-weight: 800;
        font-size: 20px;
        color: var(--text);
        letter-spacing: 0.02em;
      }
      .price small {
        font-size: 11px;
        color: var(--dim);
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0;
        white-space: nowrap;
      }
      .price .old {
        font-size: 12.5px;
        color: var(--dim);
        text-decoration: line-through;
        font-weight: 600;
        margin-right: 6px;
      }
      .price .now {
        color: #e88b7f;
      }
      .add {
        background: linear-gradient(180deg, #2a2520, #1c1815);
        border: 1px solid var(--line2);
        color: var(--gold);
        padding: 9px 15px;
        border-radius: 9px;
        font-size: 12px;
        font-weight: 800;
        font-family: var(--disp);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: 0.15s;
      }
      .add:hover {
        background: linear-gradient(180deg, #d99a4b, #b3762e);
        color: #171310;
        border-color: transparent;
      } /* ============ DRAWER / MODAL ============ */
      .ovl {
        position: fixed;
        inset: 0;
        background: rgba(4, 3, 3, 0.68);
        backdrop-filter: blur(3px);
        z-index: 90;
        opacity: 0;
        pointer-events: none;
        transition: 0.2s;
      }
      .ovl.show {
        opacity: 1;
        pointer-events: auto;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(440px, 100vw);
        background: var(--bg2);
        border-left: 1px solid var(--line2);
        z-index: 100;
        transform: translateX(100%);
        transition: 0.25s ease;
        display: flex;
        flex-direction: column;
      }
      .drawer.show {
        transform: none;
      }
      .dhead {
        padding: 20px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dhead h2 {
        font-size: 17px;
        margin: 0;
      }
      .x {
        background: none;
        border: none;
        color: var(--dim);
        font-size: 21px;
        padding: 4px;
      }
      .x:hover {
        color: var(--text);
      }
      .dbody {
        flex: 1;
        overflow-y: auto;
        padding: 18px 24px;
      }
      .dfoot {
        padding: 18px 24px;
        border-top: 1px solid var(--line);
        background: var(--bg);
      }
      .citem {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .citem .ci {
        width: 52px;
        height: 52px;
        border-radius: 10px;
        background: radial-gradient(40px 26px at 50% 32%, rgba(210, 167, 92, 0.16), transparent), #15120f;
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .citem .nm {
        flex: 1;
        min-width: 0;
      }
      .citem .nm b {
        font-size: 13.5px;
        display: block;
      }
      .citem .nm span {
        font-size: 12px;
        color: var(--muted);
      }
      .qty {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .qty button {
        width: 27px;
        height: 27px;
        border-radius: 7px;
        background: var(--panel2);
        border: 1px solid var(--line2);
        color: var(--text);
        font-size: 14px;
        line-height: 1;
      }
      .qty b {
        min-width: 18px;
        text-align: center;
        font-size: 13.5px;
      }
      .trow {
        display: flex;
        justify-content: space-between;
        font-size: 13.5px;
        color: var(--muted);
        padding: 3px 0;
      }
      .trow.tt {
        color: var(--text);
        font-weight: 800;
        font-size: 16px;
        border-top: 1px solid var(--line2);
        margin-top: 8px;
        padding-top: 10px;
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 110;
        display: none;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        padding: 44px 16px;
      }
      .modal.show {
        display: flex;
      }
      .mbox {
        background: var(--bg2);
        border: 1px solid var(--line2);
        border-radius: 16px;
        width: 100%;
        max-width: 580px;
        padding: 28px;
        position: relative;
        animation: pop 0.18s ease;
      }
      @keyframes pop {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: none;
          opacity: 1;
        }
      }
      .mbox .x {
        position: absolute;
        top: 14px;
        right: 14px;
      } /* ============ INVOICE ============ */
      .inv {
        background: #faf7f0;
        color: #26201a;
        border-radius: 12px;
        padding: 28px;
        font-size: 13.5px;
      }
      .inv .top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #26201a;
        padding-bottom: 14px;
        margin-bottom: 14px;
      }
      .inv .lg {
        font-family: var(--disp);
        font-weight: 900;
        font-size: 22px;
        letter-spacing: 0.12em;
        color: #26201a;
      }
      .inv .lg small {
        display: block;
        font-size: 9px;
        letter-spacing: 0.4em;
        color: #8a7c68;
        font-weight: 700;
        margin-top: 2px;
      }
      .inv .meta {
        font-size: 12px;
        color: #6f6250;
        text-align: right;
      }
      .inv table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
      }
      .inv th {
        text-align: left;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6f6250;
        border-bottom: 1px solid #d9cfbe;
        padding: 6px 4px;
      }
      .inv td {
        padding: 7px 4px;
        border-bottom: 1px solid #ece4d4;
      }
      .inv .tr {
        text-align: right;
      }
      .inv .tots {
        margin-left: auto;
        width: 230px;
      }
      .inv .tots div {
        display: flex;
        justify-content: space-between;
        padding: 3px 4px;
      }
      .inv .tots .g {
        font-weight: 800;
        border-top: 2px solid #26201a;
        margin-top: 5px;
        padding-top: 7px;
        font-size: 15px;
      }
      .inv .foot {
        margin-top: 16px;
        font-size: 11.5px;
        color: #6f6250;
        text-align: center;
        border-top: 1px dashed #d9cfbe;
        padding-top: 12px;
      }
      .inv .stamp {
        display: inline-block;
        border: 2px solid #4a9a62;
        color: #33804c;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 2px;
        padding: 4px 12px;
        border-radius: 6px;
        transform: rotate(-4deg);
        text-transform: uppercase;
        margin-top: 8px;
      } /* ============ ORDERS ============ */
      .order {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .order .oi {
        width: 54px;
        height: 54px;
        border-radius: 12px;
        background: #15120f;
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .order .om {
        flex: 1;
        min-width: 170px;
      }
      .order .om b {
        display: block;
        font-size: 14.5px;
      }
      .order .om span {
        font-size: 12.5px;
        color: var(--muted);
      }
      .st {
        font-size: 11px;
        font-weight: 800;
        padding: 5px 12px;
        border-radius: 5px;
        letter-spacing: 0.08em;
        font-family: var(--disp);
        text-transform: uppercase;
      }
      .st.ready {
        background: rgba(95, 184, 120, 0.13);
        color: var(--green);
        border: 1px solid rgba(95, 184, 120, 0.35);
      }
      .st.prep {
        background: rgba(210, 167, 92, 0.12);
        color: var(--gold);
        border: 1px solid rgba(210, 167, 92, 0.35);
      }
      .st.done {
        background: var(--panel2);
        color: var(--muted);
        border: 1px solid var(--line2);
      } /* ============ LOYALTY ============ */
      .lcard {
        border-radius: 18px;
        padding: 32px;
        position: relative;
        overflow: hidden;
        max-width: 490px;
        border: 1px solid #4d4a45;
        background:
          radial-gradient(420px 200px at 85% -30%, rgba(210, 167, 92, 0.16), transparent 60%), repeating-linear-gradient(105deg, transparent 0 3px, rgba(255, 255, 255, 0.012) 3px 4px),
          linear-gradient(150deg, #1d1b18, #0d0c0b 70%);
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 1px 0 rgba(255, 255, 255, 0.06) inset;
      }
      .lcard .brand2 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
      }
      .lcard .brand2 .wm {
        font-family: var(--disp);
        font-weight: 900;
        font-size: 19px;
        letter-spacing: 0.14em;
      }
      .lcard .tier {
        color: var(--gold);
        font-family: var(--disp);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        border: 1px solid rgba(210, 167, 92, 0.45);
        padding: 5px 13px;
        border-radius: 5px;
      }
      .lcard .pts {
        font-family: var(--disp);
        font-weight: 900;
        font-size: 52px;
        line-height: 1;
        letter-spacing: 0.02em;
      }
      .lcard .pts small {
        font-size: 13px;
        color: var(--muted);
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0;
      }
      .lcard .id {
        margin-top: 22px;
        font-size: 11.5px;
        color: var(--muted);
        letter-spacing: 0.24em;
        font-family: var(--disp);
      }
      .bars {
        display: flex;
        gap: 3px;
        margin-top: 10px;
        height: 36px;
        align-items: flex-end;
      }
      .bars i {
        width: 3px;
        background: #cfc9bd;
        display: block;
      }
      .stamps {
        display: flex;
        gap: 9px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .stampc {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px dashed var(--line2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        color: var(--dim);
      }
      .stampc.f {
        border: 2px solid var(--gold);
        background: rgba(210, 167, 92, 0.12);
        color: var(--gold);
      }
      .pbar {
        height: 8px;
        background: #26221d;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 12px;
      }
      .pbar i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #8e8c88, #e8e7e4);
        border-radius: 6px;
        transition: 0.4s;
      } /* ============ PLANNER ============ */
      .week {
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      }
      .day {
        background: linear-gradient(180deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        min-height: 155px;
        display: flex;
        flex-direction: column;
      }
      .day h4 {
        font-family: var(--disp);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .day .slot {
        flex: 1;
      }
      .meal {
        background: var(--bg2);
        border: 1px solid var(--line2);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12.5px;
        margin-bottom: 7px;
        display: flex;
        justify-content: space-between;
        gap: 6px;
        align-items: center;
      }
      .meal button {
        background: none;
        border: none;
        color: var(--dim);
        font-size: 13px;
        padding: 0;
      }
      .meal button:hover {
        color: #e88b7f;
      }
      .dayadd {
        background: none;
        border: 1px dashed var(--line2);
        color: var(--dim);
        border-radius: 8px;
        padding: 7px;
        font-size: 12px;
        width: 100%;
        transition: 0.15s;
      }
      .dayadd:hover {
        color: var(--gold);
        border-color: var(--amber);
      } /* ============ RECIPES ============ */
      .recipes {
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      }
      .rec .img {
        height: 140px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        border: 1px solid var(--line);
        background: radial-gradient(200px 110px at 50% 28%, rgba(210, 167, 92, 0.16), transparent 70%), linear-gradient(180deg, #191512, #100e0c);
      }
      .rec h3 {
        font-size: 15.5px;
        font-weight: 700;
      }
      .rec .meta {
        display: flex;
        gap: 14px;
        color: var(--muted);
        font-size: 12.5px;
        margin: 7px 0 13px;
      }
      .rec .acts {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: auto;
      }
      .rec .acts .btn {
        padding: 8px 13px;
        font-size: 11px;
        letter-spacing: 0.07em;
      }
      .rec {
        display: flex;
        flex-direction: column;
      } /* ============ NEWSLETTER / FOOTER ============ */
      .news {
        border-radius: 16px;
        border: 1px solid var(--line2);
        padding: 40px;
        margin-top: 46px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(560px 260px at 12% -40%, rgba(210, 167, 92, 0.14), transparent 60%), linear-gradient(160deg, #1a1613, #0e0c0a 70%);
      }
      .news .frm {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        max-width: 480px;
      }
      .news .frm input {
        flex: 1;
        border-radius: 999px;
        padding-left: 20px;
      }
      .news .frm .btn {
        border-radius: 999px;
      }
      .prefs {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .prefs label {
        display: flex;
        gap: 7px;
        align-items: center;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
      }
      .prefs input {
        accent-color: var(--amber);
      }
      footer {
        background: #080706;
        border-top: 1px solid var(--line);
        margin-top: 64px;
      }
      .fwrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 40px 22px 30px;
      }
      .fcols {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 30px;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--line);
      }
      .fcols h5 {
        font-family: var(--disp);
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 12px;
      }
      .fcols button {
        display: block;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 13px;
        padding: 4px 0;
        text-align: left;
      }
      .fcols button:hover {
        color: var(--gold);
      }
      .fbot {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        padding-top: 20px;
        color: var(--dim);
        font-size: 12.5px;
      }
      /* ============ WHATSAPP ============ */
      .wa-float {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 80;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(180deg, #2bb857, #1e9e46);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 10px 26px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.09) inset;
        transition: 0.18s;
      }
      .wa-float:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 14px 32px rgba(30, 158, 70, 0.35);
      }
      .wa-float svg {
        width: 28px;
        height: 28px;
        fill: #fff;
      }
      .btn-w {
        background: linear-gradient(180deg, #1e3826, #152b1d);
        border: 1px solid #2e7d47;
        color: #7fe0a0;
      }
      .btn-w:hover {
        border-color: #3fae62;
        color: #a5f0c0;
      }
      /* ============ STORE SECTION ============ */
      .store {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 26px;
        margin-top: 46px;
        align-items: start;
      }
      .store .s-story {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.75;
        margin-top: 10px;
      }
      .store .s-map {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        color: var(--gold);
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid var(--line2);
        padding: 9px 16px;
        border-radius: 9px;
        transition: 0.15s;
      }
      .store .s-map:hover {
        border-color: var(--amber);
        background: var(--panel);
      }
      .hours .hrow {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13.5px;
      }
      .hours .hrow:last-child {
        border-bottom: none;
      }
      .hours .hrow span:first-child {
        color: var(--muted);
      }
      .hours .hrow b {
        color: var(--text);
        font-weight: 600;
      }
      .hours .today b {
        color: var(--gold);
      }
      @media (max-width: 900px) {
        .store {
          grid-template-columns: 1fr;
        }
      }
      /* ============ EMBERS / REVEAL ============ */
      .hero {
        position: relative;
        overflow: hidden;
      }
      .embers {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .embers i {
        position: absolute;
        bottom: -8px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffc37e 20%, #d96a1e 65%, transparent 75%);
        opacity: 0;
        animation: emb linear infinite;
      }
      @keyframes emb {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 0.9;
        }
        60% {
          opacity: 0.35;
        }
        100% {
          transform: translate(var(--dx, 24px), -360px) scale(0.35);
          opacity: 0;
        }
      }
      .io-pre {
        opacity: 0;
        transform: translateY(14px);
      }
      .io-in {
        opacity: 1;
        transform: none;
        transition:
          opacity 0.55s ease,
          transform 0.55s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        .io-pre {
          opacity: 1;
          transform: none;
        }
        .embers i {
          animation: none;
        }
      }
      #toast {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translate(-50%, 20px);
        background: #211d18;
        border: 1px solid var(--line2);
        color: var(--text);
        padding: 13px 24px;
        border-radius: 10px;
        font-size: 13.5px;
        font-weight: 600;
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: 0.25s;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.6);
      }
      #toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      #toast b {
        color: var(--gold);
      }
      .section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      @media (max-width: 900px) {
        .herowrap {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 36px;
        }
        .hero {
          padding: 36px 28px;
          min-height: 340px;
        }
        .fcols {
          grid-template-columns: 1fr 1fr;
        }
        /* header: brand + actions on row 1, full-width search on row 2 */
        .mainhead .in {
          height: auto;
          flex-wrap: wrap;
          padding: 12px 16px 14px;
          gap: 10px 12px;
        }
        .search {
          order: 3;
          flex: 1 1 100%;
          max-width: none;
        }
        .search input {
          padding: 10px 44px 10px 18px;
        }
        .hacts {
          gap: 2px;
        }
        .hbtn {
          padding: 6px 7px;
        }
        .hbtn span:not(.i) {
          display: none;
        }
        .cartbtn {
          padding: 9px 13px;
        }
        .cartbtn #cartlbl {
          display: none;
        }
        .bull {
          width: 36px;
          height: 36px;
        }
        .wordmark .km {
          font-size: 23px;
        }
        .wordmark .tg {
          font-size: 7.5px;
          letter-spacing: 0.3em;
        }
        .brand {
          gap: 10px;
        }
      }
      @media (max-width: 640px) {
        main {
          padding: 22px 14px 56px;
        }
        .products {
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }
        .prod .img {
          height: 112px;
        }
        .prod .img svg {
          max-width: 86px;
          max-height: 86px;
        }
        .prod .bd {
          padding: 12px 13px 14px;
        }
        .prod h3 {
          font-size: 13.5px;
        }
        .prod .desc {
          font-size: 11.5px;
          margin: 3px 0 10px;
        }
        .price {
          font-size: 17px;
        }
        .add {
          padding: 7px 11px;
          font-size: 11px;
        }
        .prod .tag {
          top: 8px;
          left: 8px;
        }
        h1 {
          font-size: 31px;
        }
        .hero {
          padding: 30px 22px;

            .join(
              "",
            )}     <h3 class="disp" style="font-size:12px;color:var(--gold);margin:16px 0 8px;letter-spacing:.2em">${i.rec_steps}</h3>     ${steps.map((s, ix) => `<div style="display:flex;gap:12px;padding:6px 0;font-size:13.5px;color:var(--muted)"><b style="color:var(--gold)">${ix + 1}</b><span>${s}</span></div>`).join("")}     <button class="btn btn-r" style="width:100%;margin-top:18px" onclick="buyRecipe('${r.id}');closeAll()">${i.rec_buy}</button>`;
        $("modal").classList.add("show");
      }
      function buyRecipe(rid) {
        const r = RECIPES.find((x) => x.id === rid);
        r.ing.forEach(([id, q]) => (S.cart[id] = (S.cart[id] || 0) + q));
        render();
        toast(`▣ <b>${S.lang === "es" ? r.es : r.en}</b> ${t().added}`);
      }
      function planRecipe(rid) {
        const i = t();
        const r = RECIPES.find((x) => x.id === rid);
        $("mbox").innerHTML =
          `     <button class="x" onclick="closeAll()">✕</button>     <h2 style="margin-bottom:14px;font-size:19px">${i.choose_day}</h2>     <div class="grid" style="grid-template-columns:1fr 1fr;gap:8px">${i.days.map((d, ix) => `<button class="btn btn-g" onclick="addMeal(${ix},'${r.id}');go('planner')">${d}</button>`).join("")}</div>`;
        $("modal").classList.add("show");
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeAll();
      });
      render();
    </script>
  </body>
</html>
